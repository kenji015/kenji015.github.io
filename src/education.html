<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="static/style.css">
  <link rel="stylesheet" href="static/education.css">
  <title>Maximilian Mahrhofer Portfolio Website</title>
</head>
<body>
  <header id="header">
    <a href="../index.html" class="logo">M. Mahrhofer</a>
    <nav>
      <a href="../index.html" class="active">Home</a>
      <a href="services.html">Services</a>
      <a href="skills.html">Skills</a>
      <a href="education.html">Education</a>
      <a href="experience.html">Experience</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="menu-toggle" id="menu-toggle">
      <i class="fas fa-bars"></i>
    </div>
  </header>

  <div class="glow-effect"></div>
  <div class="glow-effect2"></div>

  <section class="home">
    <h1 class= "education-head">My Education</h1>
    <div class="education-buttons">
        <button>BVS</button>
        <button>TGM</button>
      </div>
  </section>

  <script>
    // Navbar scroll behavior
    const header = document.getElementById("header");
    window.addEventListener("scroll", () => {
      if (window.scrollY > 10) {
        header.classList.add("navscroll");
      } else {
        header.classList.remove("navscroll");
      }
    });

    
  </script>
</body>
</html>
