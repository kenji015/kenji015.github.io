<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills | Maximilian Mahrhofer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .skill-category {
      margin-bottom: 3rem;
      animation: fadeInUp 0.8s ease-out;
    }

    .skill-category h3 {
      color: #ff6b6b;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }

    .skill-item {
      background: rgba(255, 107, 107, 0.05);
      border: 1px solid rgba(255, 107, 107, 0.2);
      padding: 1.5rem;
      border-radius: 0.5rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .skill-item:hover {
      background: rgba(255, 107, 107, 0.1);
      border-color: #ff6b6b;
      transform: translateY(-5px);
    }

    .skill-item i {
      font-size: 2rem;
      color: #ff6b6b;
      margin-bottom: 0.5rem;
      display: block;
    }

    .skill-item p {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.8);
      margin: 0;
    }
  </style>
</head>

<body>
  <header id="header">
    <a href="../index.html" class="logo">M. Mahrhofer</a>
    <nav>
      <a href="../index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="skills.html" class="active">Skills</a>
      <a href="education.html">Education</a>
      <a href="experience.html">Experience</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="menu-toggle" id="menu-toggle">
      <i class="fas fa-bars"></i>
    </div>
  </header>

  <section class="home">
    <div class="home-content">
      <h1>My <span class="span-color">Skills</span></h1>
      <p>A comprehensive set of technical abilities</p>
    </div>
  </section>

  <section>
    <div style="width: 100%; max-width: 1200px;">

      <div class="skill-category">
        <h3><i class="fas fa-code"></i> Frontend Development</h3>
        <div class="skills-grid">
          <div class="skill-item">
            <i class="fab fa-html5"></i>
            <p>HTML5</p>
          </div>
          <div class="skill-item">
            <i class="fab fa-css3-alt"></i>
            <p>CSS3</p>
          </div>
          <div class="skill-item">
            <i class="fab fa-js-square"></i>
            <p>JavaScript</p>
          </div>
          <div class="skill-item">
            <i class="fab fa-react"></i>
            <p>React</p>
          </div>
        </div>
      </div>

      <div class="skill-category">
        <h3><i class="fas fa-server"></i> Backend Development</h3>
        <div class="skills-grid">
          <div class="skill-item">
            <i class="fab fa-python"></i>
            <p>Python</p>
          </div>
          <div class="skill-item">
            <i class="fab fa-node-js"></i>
            <p>Node.js</p>
          </div>
          <div class="skill-item">
            <i class="fab fa-java"></i>
            <p>Java</p>
          </div>
          <div class="skill-item">
            <i class="fas fa-database"></i>
            <p>SQL</p>
          </div>
        </div>
      </div>

      <div class="skill-category">
        <h3><i class="fas fa-tools"></i> Tools & Technologies</h3>
        <div class="skills-grid">
          <div class="skill-item">
            <i class="fab fa-git-alt"></i>
            <p>Git</p>
          </div>
          <div class="skill-item">
            <i class="fab fa-docker"></i>
            <p>Docker</p>
          </div>
          <div class="skill-item">
            <i class="fas fa-terminal"></i>
            <p>Linux</p>
          </div>
          <div class="skill-item">
            <i class="fas fa-shield-alt"></i>
            <p>Security</p>
          </div>
        </div>
      </div>

    </div>
  </section>

  <div class="glow-effect"></div>
  <div class="glow-effect2"></div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
