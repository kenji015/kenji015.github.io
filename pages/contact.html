<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Maximilian Mahrhofer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .contact-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .contact-info {
      animation: fadeInUp 0.8s ease-out;
    }

    .contact-item {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 107, 107, 0.2);
    }

    .contact-item:last-child {
      border-bottom: none;
    }

    .contact-item i {
      font-size: 1.5rem;
      color: #ff6b6b;
      flex-shrink: 0;
      margin-top: 0.5rem;
    }

    .contact-item h3 {
      color: #ff6b6b;
      margin-bottom: 0.3rem;
    }

    .contact-item p {
      margin: 0;
      font-size: 0.95rem;
    }

    .contact-item a {
      color: rgba(255, 107, 107, 0.8);
      transition: color 0.3s ease;
    }

    .contact-item a:hover {
      color: #ff6b6b;
    }

    @media (max-width: 768px) {
      .contact-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header id="header">
    <a href="../index.html" class="logo">M. Mahrhofer</a>
    <nav>
      <a href="../index.html">Home</a>
      <a href="skills.html">Skills</a>
      <a href="education.html">Education</a>
      <a href="experience.html">Experience</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
    <div class="menu-toggle" id="menu-toggle">
      <i class="fas fa-bars"></i>
    </div>
  </header>

  <section class="home">
    <div class="home-content">
      <h1>Get In <span class="span-color">Touch</span></h1>
      <p>Let's discuss your next project</p>
    </div>
  </section>

  <section style="padding: 0; height: 100vh; display: grid; grid-template-columns: 50% 50%; gap: 0; overflow: hidden;">

    <div style="display: flex; flex-direction: column; justify-content: center; padding: 0; padding-right: 2rem; text-align: right; overflow: hidden; padding-left: 3rem;">
      <h1 style="font-size: 5.5rem; margin-bottom: 1.5rem; line-height: 1.1; font-weight: 700;">Get In <span class="span-color">Touch</span></h1>
      <p style="font-size: 1.3rem; color: rgba(255, 255, 255, 0.7); line-height: 1.6; margin-bottom: 2rem;">Let's discuss your next project</p>

      <div class="contact-item" style="text-align: left;">
        <i class="fas fa-map-marker-alt"></i>
        <div>
          <h3 style="margin: 0 0 0.3rem 0; font-size: 1rem;">Location</h3>
          <p style="margin: 0; font-size: 0.9rem;">Vienna, Austria</p>
        </div>
      </div>

      <div class="contact-item" style="text-align: left;">
        <i class="fas fa-envelope"></i>
        <div>
          <h3 style="margin: 0 0 0.3rem 0; font-size: 1rem;">Email</h3>
          <p style="margin: 0; font-size: 0.9rem;"><a href="mailto:your.email@example.com">your.email@example.com</a></p>
        </div>
      </div>

      <div class="contact-item" style="text-align: left;">
        <i class="fas fa-phone"></i>
        <div>
          <h3 style="margin: 0 0 0.3rem 0; font-size: 1rem;">Phone</h3>
          <p style="margin: 0; font-size: 0.9rem;"><a href="tel:+43123456789">+43 (0)123 456789</a></p>
        </div>
      </div>

      <div class="contact-item" style="text-align: left;">
        <i class="fas fa-link"></i>
        <div>
          <h3 style="margin: 0 0 0.3rem 0; font-size: 1rem;">Social Media</h3>
          <p style="margin: 0; font-size: 0.9rem;">
            <a href="https://www.linkedin.com/in/maximilian-mahrhofer-8626732a1/" target="_blank">LinkedIn</a> |
            <a href="https://github.com/kenji015" target="_blank">GitHub</a>
          </p>
        </div>
      </div>
    </div>

    <div style="padding: 3rem; overflow-y: auto; display: flex; flex-direction: column; justify-content: flex-start; padding-top: calc(50vh - 100px);">
      <div class="form-container" style="max-width: 100%; width: 100%;">
        <h2>Send Message</h2>
        <form>
          <input type="text" placeholder="Your Name" required />
          <input type="email" placeholder="Your Email" required />
          <textarea rows="5" placeholder="Your Message..." required></textarea>
          <button type="submit">Send Message</button>
        </form>
      </div>
    </div>

  </section>

  <div class="glow-effect"></div>
  <div class="glow-effect2"></div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
